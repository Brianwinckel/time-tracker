  <!-- Four-circle TaskPanels brand mark, matches the in-app logo -->
  <circle cx="10" cy="10" r="5" fill="#3b82f6"/>
  <circle cx="22" cy="10" r="5" fill="#f97316"/>
  <circle cx="10" cy="22" r="5" fill="#8b5cf6"/>
  <circle cx="22" cy="22" r="5" fill="#10b981"/>
</svg>
