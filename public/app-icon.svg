<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White tile so the brand mark sits clean on the home screen.
       iOS will mask the corners; the rx is for non-iOS PWA installs. -->
  <rect width="512" height="512" rx="96" fill="#ffffff"/>
  <!-- Four-circle TaskPanels brand mark, scaled from the 32x32 favicon (16x).
       Arrangement matches TaskPanelsLogo.tsx: blue/green on top,
       orange/purple on bottom. -->
  <circle cx="160" cy="160" r="80" fill="#3b82f6"/>
  <circle cx="352" cy="160" r="80" fill="#10b981"/>
  <circle cx="160" cy="352" r="80" fill="#f97316"/>
  <circle cx="352" cy="352" r="80" fill="#8b5cf6"/>
</svg>
